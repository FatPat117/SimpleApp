services:
  postgres:
    image: postgres:16-alpine
    container_name: simpleapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simpleapp
    ports:
      - "5432:5432"
    volumes:
      - simpleapp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simpleapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  simpleapp-postgres-data:
